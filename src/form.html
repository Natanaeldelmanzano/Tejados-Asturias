<div class="contact-form-widget">
    <div class="form-header">
        <h3>Presupuesto Gratuito</h3>
        <p>Te respondemos en menos de 2 horas</p>
    </div>

    <form
        id="contact-form"
        class="contact-form"
        action="https://api.web3forms.com/submit"
        method="POST"
    >
        <!-- CAMPOS OCULTOS -->
        <input type="hidden" name="access_key" value="794ac0fe-7ddb-44e0-ac50-0972b8394807">
        <input type="hidden" name="subject" value="Nuevo presupuesto desde CubiertasDavid.com">
        <input type="hidden" name="from_name" value="CubiertasDavid.com">
        <input type="hidden" name="page_source" id="page_source" value="">
        <input type="checkbox" name="botcheck" style="display: none;">

        <!-- NOMBRE -->
        <div class="form-group">
            <label for="name">Nombre *</label>
            <input type="text" id="name" name="name" class="form-control"
                   placeholder="Tu nombre completo" required minlength="2">
        </div>

        <!-- TELÉFONO -->
        <div class="form-group">
            <label for="phone">Teléfono *</label>
            <input type="tel" id="phone" name="phone" class="form-control"
                   placeholder="693 743 627" required pattern="[0-9]{9,15}"
                   title="Introduce un teléfono válido (9-15 dígitos)">
        </div>

        <!-- EMAIL (opcional) -->
        <div class="form-group">
            <label for="email">Email <span class="optional">(Opcional)</span></label>
            <input type="email" id="email" name="email" class="form-control"
                   placeholder="tu@email.com">
        </div>

        <!-- MUNICIPIO -->
        <div class="form-group">
            <label for="municipio">Municipio</label>
            <input type="text" id="municipio" name="municipio" class="form-control"
                   placeholder="Ej: Oviedo, Gijón, Avilés...">
        </div>

        <!-- SERVICIO -->
        <div class="form-group">
            <label for="servicio">Servicio Requerido *</label>
            <select id="servicio" name="servicio" class="form-control" required>
                <option value="">-- Selecciona un servicio --</option>
                <option value="reforma">Reforma de Tejado</option>
                <option value="reparacion">Reparación / Goteras</option>
                <option value="impermeabilizacion">Impermeabilización</option>
                <option value="canalones">Canalones</option>
                <option value="panel-sandwich">Panel Sándwich</option>
                <option value="pizarra">Tejado de Pizarra</option>
                <option value="aislamiento">Aislamiento</option>
                <option value="urgencia">Urgencia 24h</option>
                <option value="presupuesto">Solicitar Presupuesto</option>
                <option value="otro">Otro</option>
            </select>
        </div>

        <!-- MENSAJE -->
        <div class="form-group">
            <label for="mensaje">Describe tu Proyecto *</label>
            <textarea id="mensaje" name="mensaje" class="form-control"
                      rows="4" placeholder="Cuéntanos qué necesitas..."
                      required minlength="10"></textarea>
        </div>

        <!-- PRIVACIDAD -->
        <div class="form-group form-checkbox">
            <label class="checkbox-label">
                <input type="checkbox" name="privacy" required>
                <span>He leído y acepto la
                    <a href="/privacidad.html" target="_blank">Política de Privacidad</a> *
                </span>
            </label>
        </div>

        <!-- ENVÍO -->
        <button type="submit" class="btn btn-primary btn-block">
            <span class="btn-text">📩 Solicitar Presupuesto Gratis</span>
            <span class="btn-loading" style="display: none;">Enviando...</span>
        </button>

        <div id="form-message" class="form-message" style="display: none;"></div>
    </form>

    <div class="form-footer">
        <p class="form-footer-text">O contacta directamente:</p>
        <div class="contact-methods">
            <a href="tel:{{PHONE_LINK}}" class="contact-method">
                <span class="icon">📞</span>
                <span class="text">Llamar Ahora</span>
            </a>
            <a href="https://wa.me/{{WHATSAPP}}?text=Hola%2C%20necesito%20presupuesto%20para%20mi%20tejado"
               class="contact-method" target="_blank" rel="noopener noreferrer">
                <span class="icon">💬</span>
                <span class="text">WhatsApp</span>
            </a>
        </div>
    </div>
</div>
